<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Konfigurator — Dardania Design</title>
<meta name="description" content="Konfiguriere deine Website in wenigen Schritten: Branche, Seitentyp, Template, eigene Inhalte, Domain und Preismodell." />
<meta name="theme-color" content="#FF3B2F" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#171716; --paper:#FAFAF8; --panel:#FFFFFF; --border:#E7E4DE;
    --accent:#FF3B2F; --accent-soft:rgba(255,59,47,.08); --accent-soft2:rgba(255,59,47,.16);
    --sage:#3D7A5C; --sage-soft:rgba(61,122,92,.12); --muted:#8A8680;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,.disp{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}

  header.site{ position:sticky; top:0; z-index:40; background:rgba(250,250,248,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); }
  .site-inner{max-width:1180px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px;}
  .logo{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; text-decoration:none;}
  nav.main{display:flex; gap:22px; font-size:14px; color:var(--muted);}
  nav.main a{text-decoration:none;}
  nav.main a:hover{color:var(--ink);}
  .current{color:var(--ink); font-weight:600; position:relative;}
  .current::after{content:""; position:absolute; left:0; right:0; bottom:-16px; height:2px; background:var(--accent);}
  .cta-mini{ background:var(--ink); color:#fff; border:none; padding:9px 16px; border-radius:100px; font-size:13px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .navlinks-desktop{display:flex;}
  @media (max-width:760px){ .navlinks-desktop{display:none;} }

  .wrap{max-width:1180px; margin:0 auto; padding:32px 20px 80px;}
  .head-row{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:24px; flex-wrap:wrap;}
  .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:600; margin:0 0 4px;}
  .h1{font-size:24px; font-weight:700; margin:0;}
  .progress-box{text-align:right; font-size:12px; color:var(--muted);}
  .progress-track{width:140px; height:4px; border-radius:4px; background:var(--border); margin-top:6px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--accent); transition:width .3s ease;}

  .grid{display:grid; grid-template-columns:190px 1fr; gap:24px; align-items:start;}
  @media (max-width:860px){ .grid{grid-template-columns:1fr;} }
  .rail{display:flex; flex-direction:column; gap:2px; position:sticky; top:80px;}
  @media (max-width:860px){ .rail{flex-direction:row; overflow-x:auto; position:static; padding-bottom:6px;} }
  .rail button{ display:flex; align-items:center; gap:9px; background:none; border:none; text-align:left; padding:8px 10px; border-radius:10px; font-size:12.5px; color:#C9C6BE; white-space:nowrap; }
  .rail button.reachable{color:var(--ink);}
  .rail button.active{background:var(--ink); color:#fff;}
  .rail .dot{ width:18px; height:18px; border-radius:50%; background:#EEEBE4; color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:9.5px; font-weight:700; flex-shrink:0; }
  .rail button.active .dot{background:#fff; color:var(--ink);}
  .rail button.done .dot{background:var(--sage); color:#fff;}

  .card{background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:22px 24px;}
  @media (max-width:520px){ .card{padding:18px;} }
  .step-title{font-size:19px; font-weight:700; margin:0 0 4px;}
  .step-sub{font-size:13.5px; color:var(--muted); margin:0 0 20px;}
  .note-box{font-size:12.5px; color:var(--muted); background:#F7F6F2; border-radius:10px; padding:10px 13px; margin-bottom:18px;}

  .opt-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .opt-grid.two{grid-template-columns:repeat(2,1fr);}
  .opt-grid.four{grid-template-columns:repeat(4,1fr);}
  @media (max-width:900px){ .opt-grid.four{grid-template-columns:repeat(3,1fr);} }
  @media (max-width:700px){ .opt-grid, .opt-grid.two, .opt-grid.four{grid-template-columns:1fr 1fr;} }
  @media (max-width:480px){ .opt-grid, .opt-grid.two, .opt-grid.four{grid-template-columns:1fr;} }

  .opt-card{ text-align:left; border:2px solid var(--border); border-radius:14px; padding:14px; background:transparent; transition:border-color .15s; }
  .opt-card.selected{border-color:var(--accent); background:var(--accent-soft);}
  .opt-card .emoji{font-size:19px; display:block; margin-bottom:8px;}
  .opt-card .title{font-weight:600; font-size:13.5px; font-family:'Space Grotesk',sans-serif; display:flex; align-items:center; gap:6px; margin:0 0 3px;}
  .opt-card .sub{font-size:11.5px; color:var(--muted); margin:0; line-height:1.4;}
  .opt-card .price{font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:600; margin-top:8px;}

  .type-card{padding:18px;}
  .type-card .emoji{font-size:24px;}
  .type-card .title{font-size:15px; margin-top:8px;}
  .type-card .sub{font-size:12.5px;}
  .shop-note{ margin-top:16px; padding:16px 18px; border-radius:14px; background:var(--accent-soft); border:1px solid var(--accent-soft2); font-size:13px; display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
  .shop-note a.cta{ background:var(--accent); color:#fff; text-decoration:none; padding:9px 16px; border-radius:100px; font-size:12.5px; font-weight:700; }

  .tpl-card{border:2px solid var(--border); border-radius:14px; overflow:hidden; text-align:left; background:var(--panel); padding:0;}
  .tpl-card.selected{border-color:var(--accent);}
  .tpl-body{padding:10px 12px;}
  .tpl-body .title{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:12.5px; display:flex; align-items:center; gap:6px; margin:0 0 3px;}
  .tpl-body .sub{font-size:11px; color:var(--muted); margin:0; line-height:1.35;}

  /* preview + device toggle */
  .view-toggle{display:inline-flex; border:1px solid var(--border); border-radius:100px; padding:3px; margin-bottom:10px;}
  .view-toggle button{border:none; background:none; padding:6px 13px; border-radius:100px; font-size:11.5px; font-weight:600; color:var(--muted); display:flex; align-items:center; gap:5px;}
  .view-toggle button.active{background:var(--ink); color:#fff;}

  .mini-browser{border-bottom:1px solid var(--border);}
  .mini-topbar{display:flex; align-items:center; gap:5px; padding:8px 10px; background:#F1EFEA; border-bottom:1px solid var(--border);}
  .mini-dot{width:8px; height:8px; border-radius:50%;}
  .mini-url{flex:1; text-align:center; font-size:9px; padding:3px 0; border-radius:5px; background:#fff; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-left:6px;}
  .mini-nav{display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--border); font-size:11px;}
  .mini-nav .brand{display:flex; align-items:center; gap:6px; font-weight:600; font-family:'Space Grotesk',sans-serif;}
  .mini-logo{width:16px; height:16px; border-radius:4px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:8px; font-weight:700; object-fit:cover;}
  .mini-nav .links{display:flex; gap:7px; font-size:8.5px; color:var(--muted); flex-wrap:wrap; justify-content:flex-end;}
  .mini-hero-center{padding:24px 16px; text-align:center; background:#FAFAF8; background-size:cover; background-position:center;}
  .mini-hero-split{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:18px 14px; align-items:center; background:#FAFAF8;}
  .mini-hero-overlay{padding:30px 16px; text-align:center; background-size:cover; background-position:center; position:relative;}
  .mini-hero-overlay .scrim{position:absolute; inset:0; background:rgba(0,0,0,.32);}
  .mini-hero-overlay .inner{position:relative;}
  .mini-eyebrow{font-size:8.5px; text-transform:uppercase; letter-spacing:.14em; margin:0 0 6px;}
  .mini-headline{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; margin:0 0 5px; line-height:1.3;}
  .mini-desc{font-size:9.5px; color:var(--muted); margin:0 0 10px;}
  .mini-btn{display:inline-block; font-size:9.5px; padding:6px 12px; border-radius:7px; font-weight:600;}
  .mini-body{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:12px;}
  .mini-tile{background:#F7F6F2; border-radius:8px; padding:8px; text-align:center; background-size:cover; background-position:center; min-height:56px; position:relative;}
  .mini-tile .tile-emoji{font-size:14px; display:block; margin-bottom:6px;}
  .mini-tile .ln{height:4px; border-radius:3px; background:var(--border); margin:0 auto 4px; width:70%;}
  .mini-tile.has-img .ln, .mini-tile.has-img .tile-emoji{display:none;}
  .mini-tile.has-img .tile-label{position:absolute; left:5px; right:5px; bottom:5px; font-size:7.5px; color:#fff; background:rgba(0,0,0,.4); border-radius:4px; padding:2px 4px;}
  .mini-foot{display:flex; justify-content:space-between; padding:6px 12px; border-top:1px solid var(--border); font-size:8.5px; color:var(--muted);}

  /* craft hero layouts (Handwerk) */
  .craft-hero{padding:16px; background:#FAFAF8;}
  .craft-split-grid{display:grid; grid-template-columns:1.2fr 1fr; gap:12px; align-items:center;}
  .craft-round-img{width:100%; aspect-ratio:1/1; border-radius:50%; background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; font-size:26px;}
  .craft-btn-row{display:flex; gap:6px; margin-top:8px;}
  .craft-btn{font-size:8.5px; font-weight:700; padding:6px 10px; border-radius:6px;}
  .craft-chip-row{display:flex; gap:6px; margin-top:12px;}
  .craft-chip{flex:1; text-align:center; background:#F1EFEA; border-radius:8px; padding:7px 4px;}
  .craft-chip .em{font-size:13px; display:block; margin-bottom:3px;}
  .craft-chip .lb{font-size:7.5px; color:var(--muted); font-weight:600;}

  .craft-photo-hero{min-height:120px; background-size:cover; background-position:center; position:relative; display:flex; align-items:flex-end;}
  .craft-photo-scrim{position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,0) 65%);}
  .craft-photo-inner{position:relative; padding:12px 14px; width:100%;}
  .craft-badge{display:inline-block; font-size:8px; font-weight:700; padding:5px 10px; border-radius:100px; margin-top:6px;}
  .craft-quicklinks{display:flex; justify-content:space-around; padding:10px 8px; background:#FAFAF8;}
  .craft-quicklink{text-align:center; font-size:7.5px; color:var(--muted); font-weight:600;}
  .craft-quicklink .em{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; margin:0 auto 3px;}

  .craft-trust-row{display:flex; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border);}
  .craft-trust-item{flex:1; text-align:center;}
  .craft-trust-item .em{font-size:13px; display:block; margin-bottom:2px;}
  .craft-trust-item .lb{font-size:7px; color:var(--muted); font-weight:600;}

  .craft-bold-hero{padding:20px 16px; position:relative; overflow:hidden;}
  .craft-bold-headline{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; line-height:1.25; color:#fff; margin:0 0 8px;}
  .craft-stat-row{display:flex; gap:8px; margin-top:12px;}
  .craft-stat{flex:1; background:rgba(255,255,255,.08); border-radius:8px; padding:7px 5px; text-align:center;}
  .craft-stat .num{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:11px; color:#fff; display:block;}
  .craft-stat .lb{font-size:6.5px; color:rgba(255,255,255,.65);}

  .craft-illu-ribbon{padding:16px; text-align:left;}
  .craft-illu-band{display:inline-block; padding:6px 10px; border-radius:4px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; line-height:1.35; margin-bottom:10px;}

  .phone-status{display:flex; justify-content:space-between; align-items:center; padding:6px 16px 2px; font-size:10px; font-weight:600; background:#fff;}
  .phone-status .icons{display:flex; gap:3px; align-items:center; font-size:9px;}

  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:22px;}
  @media (max-width:820px){ .form-grid{grid-template-columns:1fr;} }
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; font-weight:600; margin-bottom:5px;}
  .field input, .field select, .field textarea{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); font-size:13.5px; background:#fff; color:var(--ink); font-family:inherit; resize:vertical; }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .preview-label{font-size:12px; color:var(--muted); font-weight:600; margin-bottom:8px;}

  .logo-row{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .btn-ghost{ display:flex; align-items:center; gap:7px; background:none; border:1px solid var(--border); border-radius:10px; padding:9px 13px; font-size:12.5px; font-weight:600; }
  .logo-thumb{width:32px; height:32px; object-fit:contain; border:1px solid var(--border); border-radius:8px; background:#fff;}
  .swatches{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .swatch{width:26px; height:26px; border-radius:50%; border:2px solid transparent; padding:0;}
  .swatch.selected{border-color:var(--ink);}
  .swatch-custom{width:26px; height:26px; border-radius:50%; border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--muted); position:relative; overflow:hidden;}
  .swatch-custom input{position:absolute; inset:0; opacity:0; cursor:pointer;}

  .page-content-list{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  .page-content-card{border:1px solid var(--border); border-radius:12px; padding:12px 14px;}
  .page-content-card .pc-head{font-size:13px; font-weight:600; font-family:'Space Grotesk',sans-serif; margin-bottom:8px; display:flex; align-items:center; gap:6px;}
  .pc-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  @media (max-width:520px){ .pc-row{grid-template-columns:1fr;} }
  .pc-img-row{display:flex; align-items:center; gap:10px; margin-top:8px;}
  .pc-img-thumb{width:44px; height:44px; border-radius:8px; object-fit:cover; border:1px solid var(--border);}

  .domain-input-row{display:flex; gap:8px; max-width:420px; align-items:center;}
  .domain-suffix{font-size:13px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  .btn-check{background:var(--ink); color:#fff; border:none; padding:10px 14px; border-radius:10px; font-size:12.5px; font-weight:600; flex-shrink:0;}
  .btn-check:disabled{opacity:.45;}
  .domain-result{font-size:12.5px; margin-top:8px; display:flex; align-items:center; gap:6px;}
  .domain-fallback{font-size:12px; margin-top:6px; color:var(--muted);}
  .domain-fallback a{color:var(--ink); text-decoration:underline;}

  .addon-card{border:2px solid var(--border); border-radius:14px; padding:16px; text-align:left; background:transparent; width:100%;}
  .addon-card.selected{border-color:var(--ink); background:#FAFAF9;}
  .addon-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;}
  .checkbox{width:18px; height:18px; border-radius:5px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; flex-shrink:0;}
  .checkbox.checked{background:var(--ink); border-color:var(--ink);}
  .addon-note{margin-top:10px;}
  .addon-note textarea{width:100%; font-size:12px; padding:8px 10px; border-radius:8px; border:1px solid var(--border); font-family:inherit; resize:vertical;}

  .page-list{display:flex; flex-direction:column; gap:8px;}
  .page-item{ display:flex; align-items:center; gap:12px; border:1px solid var(--border); border-radius:12px; padding:11px 14px; background:transparent; text-align:left; width:100%; }
  .page-item.selected{border-color:var(--ink); background:#FAFAF9;}
  .page-item.locked{opacity:.7; cursor:default;}
  .page-item .label{font-size:13.5px; font-weight:500; flex:1;}
  .page-item .tag{font-size:10.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  .page-count-note{font-size:12.5px; margin-top:12px; padding:10px 14px; border-radius:10px; background:#F7F6F2; color:var(--muted);}
  .page-count-note.ok{color:var(--sage); background:var(--sage-soft);}
  .page-count-note.warn{color:var(--accent); background:var(--accent-soft);}

  .pkg-resolved{ border:2px solid var(--ink); border-radius:16px; padding:18px; display:flex; align-items:center; gap:14px; margin-bottom:20px; }
  .pkg-resolved .emoji{font-size:26px;}
  .pkg-resolved .name{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px;}
  .pkg-resolved .sub{font-size:12px; color:var(--muted);}

  .pay-card{border:2px solid var(--border); border-radius:16px; padding:18px; text-align:left; position:relative; width:100%;}
  .pay-card.selected{border-color:var(--accent); background:var(--accent-soft);}
  .pay-card .title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14.5px; margin:0 0 4px;}
  .pay-price{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:21px; margin:6px 0 2px;}
  .pay-price-alt{font-size:12px; color:var(--muted); margin:0 0 6px;}
  .pay-sub{font-size:11.5px; color:var(--muted); margin:0;}
  .interval-toggle{display:inline-flex; border:1px solid var(--border); border-radius:100px; padding:3px; margin-top:14px;}
  .interval-toggle button{border:none; background:none; padding:7px 14px; border-radius:100px; font-size:12px; font-weight:600; color:var(--muted);}
  .interval-toggle button.active{background:var(--ink); color:#fff;}

  .summary-row{display:flex; justify-content:space-between; gap:12px; font-size:13.5px; padding:9px 0; border-bottom:1px solid var(--border);}
  .summary-row span:first-child{color:var(--muted);}
  .summary-row span:last-child{font-weight:600; text-align:right; max-width:60%;}
  .total-row{display:flex; justify-content:space-between; align-items:center; padding-top:14px;}
  .total-row .label{font-weight:700; font-size:14px;}
  .total-row .amt{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:20px;}
  .total-note{font-size:11.5px; color:var(--muted); margin-top:4px;}

  .agb-row{display:flex; align-items:flex-start; gap:10px; margin-top:16px; font-size:12px; color:var(--muted); line-height:1.5;}
  .agb-row input{margin-top:2px;}
  .agb-row a{color:var(--ink); text-decoration:underline;}
  .outcome-note{font-size:12px; color:var(--muted); background:#F7F6F2; border-radius:10px; padding:10px 13px; margin-top:12px;}

  .nav-buttons{display:flex; justify-content:space-between; align-items:center; margin-top:26px; padding-top:18px; border-top:1px solid var(--border);}
  .btn-back{background:none; border:none; color:var(--ink); font-size:13.5px; display:flex; align-items:center; gap:4px; padding:8px 4px;}
  .btn-back:disabled{color:#D8D5CE;}
  .btn-next{background:var(--ink); color:#fff; border:none; padding:11px 20px; border-radius:100px; font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .btn-next:disabled{background:#D8D5CE;}
  .btn-submit{width:100%; background:var(--accent); color:#fff; border:none; padding:13px; border-radius:12px; font-size:14px; font-weight:700; margin-top:14px;}
  .btn-submit:disabled{background:#D8D5CE;}

  .success{text-align:center; padding:50px 10px;}
  .success .ring{width:56px; height:56px; border-radius:50%; background:var(--sage-soft); display:flex; align-items:center; justify-content:center; margin:0 auto 16px;}

  footer.site{border-top:1px solid var(--border); margin-top:40px; padding:26px 20px; font-size:12.5px; color:var(--muted);}
  .footer-inner{max-width:1180px; margin:0 auto; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;}
  .footer-inner a{text-decoration:none; margin-left:14px;}
  .footer-inner a:hover{color:var(--ink);}

  .icon{width:14px; height:14px; display:inline-block; vertical-align:-2px;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header class="site">
  <div class="site-inner">
    <a class="logo" href="https://www.dardaniadesign.com/">Dardania Design</a>
    <nav class="main navlinks-desktop">

      layout: l.id,
      accent: c.accent,
      dark: style.dark,
      photo: style.photos[li],

function currentAccent(){ const t=currentTemplate(); return state.form.accent || (t && t.accent) || "#2C3E63"; }
function pagePool(){ return state.category ? CATEGORY_PAGES[state.category] : []; }

function pageLimits(){ return state.siteType==="onepager" ? {min:3,max:6,noun:"Bereiche"} : {min:5,max:8,noun:"Seiten"}; }
function ensurePageContent(id){ if(!state.pageContent[id]) state.pageContent[id] = { title:"", text:"", image:null }; }

  const links = (navLabels && navLabels.length ? navLabels : ["Leistungen","Über uns","Kontakt"]).slice(0,4);
  const logoHtml = logo
    ? `<img class="mini-logo" src="${logo}" alt="" style="background:#fff;" />`

  const bodyPages = selectedPages().filter(p=>p.id!=="start").slice(0,3);
  const tiles = bodyPages.length ? bodyPages.map((p,i)=>({
    emoji: cat ? cat.tiles[i % cat.tiles.length] : "✦",

}

/* ================= RAIL / NAV ================= */
function renderRail(){
  const rail = document.getElementById("rail");
  rail.innerHTML = STEP_LABELS.map((label,i)=>{
    const idx=i+1, active=idx===state.step, done=idx<state.step, reachable=idx<=state.maxReached;
    return `<button data-goto="${idx}" class="${active?"active":""} ${reachable?"reachable":""} ${done?"done":""}" ${reachable?"":"disabled"}>
      <span class="dot">${done?okIcon():idx}</span>${label}
    </button>`;
  }).join("");
  rail.querySelectorAll("button[data-goto]").forEach(b=>{
    b.addEventListener("click", ()=>{ const n=parseInt(b.dataset.goto); if(n<=state.maxReached) goto(n); });
  });
}
function okIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>`; }
function chevron(dir){ const d = dir==="left" ? "M15 18l-6-6 6-6" : "M9 18l6-6-6-6"; return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="${d}"/></svg>`; }
function desktopIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`; }
function mobileIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>`; }
function uploadIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`; }
function xIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>`; }
function globeIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`; }
function phoneIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`; }
function mailIcon(){ return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>`; }

function goto(n){ state.step=n; state.maxReached=Math.max(state.maxReached,n); renderAll(); }
function next(){ if(canNext()) goto(Math.min(state.step+1,10)); }
function back(){ goto(Math.max(state.step-1,1)); }

function canNext(){
  switch(state.step){
    case 1: return !!state.category;
    case 2: return !!state.siteType && state.siteType!=="shop";
    case 3: return !!state.templateId;
    case 4: { const {min,max}=pageLimits(); const n=selectedPages().length; return n>=min && n<=max; }
    case 5: return state.form.firma.trim().length>0;
    case 6: return state.domain.hasDomain!==null && (state.domain.hasDomain===true || state.domain.wunsch.trim().length>0);
    case 8: return state.kontakt.wunsch!==null;
    case 9: return !!state.zahlung;
    case 10: return state.agb && !state.submitted;
    default: return true;
  }
}

function renderAll(){
  renderRail();
  document.getElementById("progressLabel").textContent = `Schritt ${state.step} von 10`;
  document.getElementById("progressFill").style.width = (state.step/10*100)+"%";
  renderStep();
}
function renderStep(){
  const el = document.getElementById("stepContent");
  el.innerHTML = stepHtml();
  attachStepHandlers();
}
function navButtons(){
  if(state.step===10) return "";
  return `
  <div class="nav-buttons">
    <button class="btn-back" id="backBtn" ${state.step===1?"disabled":""}>${chevron("left")} Zurück</button>
    ${state.step<10 ? `<button class="btn-next" id="nextBtn" ${canNext()?"":"disabled"}>Weiter ${chevron("right")}</button>` : ""}
  </div>`;
}

/* ================= STEPS ================= */
function stepHtml(){
  switch(state.step){
    case 1: return stepBranche();
    case 2: return stepSeitentyp();
    case 3: return stepTemplate();
    case 4: return stepSeiten();
    case 5: return stepForm();
    case 6: return stepDomain();
    case 7: return stepAddons();
    case 8: return stepKontakt();
    case 9: return stepPreis();
    case 10: return stepSummary();
    default: return "";
  }
}

function stepSeiten(){
  const pool = pagePool();

  const heading = state.siteType==="onepager" ? "Welche Bereiche soll deine Seite haben?" : "Welche Seiten möchtest du?";
  const sub = state.siteType==="onepager"
    ? `Wähle ${min}–${max} Bereiche für deine einzelne Scroll-Seite (Startseite ist immer dabei).`
    : `Wähle ${min}–${max} Seiten für deine Website (Startseite ist immer dabei).`;
  return `

    ${pool.map(p=>{
      const locked = p.id==="start"; const sel = !!state.pages[p.id];
      return `<button class="page-item ${sel?"selected":""} ${locked?"locked":""}" data-page="${p.id}" ${locked?"disabled":""}>
        <span class="checkbox ${sel?"checked":""}">${sel?okIcon():""}</span>
        <span class="label">${p.label}</span>
        ${locked?`<span class="tag">immer dabei</span>`:""}
      </button>`;
    }).join("")}
  </div>
  <div class="page-count-note ${ok?"ok":"warn"}">
    ${n} von ${min}–${max} ${noun} ausgewählt ${ok?"— passt genau.":`— bitte ${n<min?"mehr":"weniger"} auswählen.`}

/* ================= DOMAIN CHECK (real, best-effort) ================= */
async function checkDomainReal(name){
  try{
    const res = await fetch(`https://rdap.nic.ch/domain/${encodeURIComponent(name)}.ch`, { method:"GET" });
    if(res.status===404) return { ok:true, available:true };
    if(res.status===200) return { ok:true, available:false };
    return { ok:false };
  }catch(err){
    return { ok:false };
  }
}

/* ================= HANDLERS ================= */
function attachStepHandlers(){
  const el = document.getElementById("stepContent");

  el.querySelectorAll("[data-cat]").forEach(b=>b.addEventListener("click", ()=>{
    state.category=b.dataset.cat; state.templateId=null; state.pages={start:true};
    state.pageContent={ start:{title:"",text:"",image:null} }; renderStep();
  }));
  el.querySelectorAll("[data-type]").forEach(b=>b.addEventListener("click", ()=>{
    state.siteType=b.dataset.type; state.pages={start:true};
    state.pageContent={ start:{title:"",text:"",image:null} }; renderStep();
  }));
  el.querySelectorAll("[data-tpl]").forEach(b=>b.addEventListener("click", ()=>{ state.templateId=b.dataset.tpl; renderStep(); }));
  el.querySelectorAll("[data-page]").forEach(b=>b.addEventListener("click", ()=>{
    const id=b.dataset.page; if(id==="start") return;
    state.pages[id]=!state.pages[id];
    if(state.pages[id]) ensurePageContent(id);
    renderStep();
  }));
  el.querySelectorAll("[data-domain]").forEach(b=>b.addEventListener("click", ()=>{
    state.domain.hasDomain = b.dataset.domain==="true"; state.domain.checked=false; state.domain.available=null; state.domain.mode=null; renderStep();
  }));
  el.querySelectorAll("[data-kwerkzeug]").forEach(b=>b.addEventListener("click", ()=>{ state.kontaktTool=b.dataset.kwerkzeug; renderStep(); }));
  el.querySelectorAll("[data-addon]").forEach(b=>b.addEventListener("click", ()=>{ const id=b.dataset.addon; state.addons[id]=!state.addons[id]; renderStep(); }));
  el.querySelectorAll("[data-kontakt]").forEach(b=>b.addEventListener("click", ()=>{ state.kontakt.wunsch=b.dataset.kontakt; renderStep(); }));
  el.querySelectorAll("[data-art]").forEach(b=>b.addEventListener("click", ()=>{ state.kontakt.art=b.dataset.art; renderStep(); }));
  el.querySelectorAll("[data-pay]").forEach(b=>b.addEventListener("click", ()=>{ state.zahlung=b.dataset.pay; renderStep(); }));
  el.querySelectorAll("[data-interval]").forEach(b=>b.addEventListener("click", (e)=>{ e.stopPropagation(); state.intervall=b.dataset.interval; renderStep(); }));
  el.querySelectorAll("[data-view]").forEach(b=>b.addEventListener("click", ()=>{ state.view=b.dataset.view; renderStep(); }));

  el.querySelectorAll("[data-addon-note]").forEach(t=>t.addEventListener("input", e=>{
    state.addonNotes[t.dataset.addonNote] = e.target.value;
  }));

  const zeitSelect = document.getElementById("zeitSelect");
  if(zeitSelect) zeitSelect.addEventListener("change", e=>{ state.kontakt.zeit=e.target.value; });

  const checkBtn = document.getElementById("checkDomainBtn");
  if(checkBtn) checkBtn.addEventListener("click", async ()=>{
    state.domain.checking=true; state.domain.checked=false; renderStep();
    const name = state.domain.wunsch.trim();
    const result = await checkDomainReal(name);
    state.domain.checking=false; state.domain.checked=true;
    if(result.ok){ state.domain.mode="live"; state.domain.available=result.available; }
    else { state.domain.mode="error"; state.domain.available=null; }
    renderStep();
  });

  const agbCheck = document.getElementById("agbCheck");
  if(agbCheck) agbCheck.addEventListener("change", e=>{ state.agb=e.target.checked; syncSubmitBtn(); });

  const submitBtn = document.getElementById("submitBtn");
  if(submitBtn) submitBtn.addEventListener("click", ()=>{ if(state.agb){ state.submitted=true; renderStep(); } });

  const backBtn = document.getElementById("backBtn");
  if(backBtn) backBtn.addEventListener("click", back);
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.addEventListener("click", next);

  bindText("f_firma", v=>{ state.form.firma=v; updatePreview(); syncNextBtn(); });
  bindText("f_slogan", v=>{ state.form.slogan=v; updatePreview(); });
  bindText("f_adresse", v=>{ state.form.adresse=v; });
  bindText("f_ort", v=>{ state.form.ort=v; });
  bindText("f_telefon", v=>{ state.form.telefon=v; });
  bindText("f_email", v=>{ state.form.email=v; });
  bindText("d_existing", v=>{ state.domain.wunsch=v; syncNextBtn(); });
  bindText("d_wish", v=>{ state.domain.wunsch=v; state.domain.checked=false; syncCheckBtn(); syncNextBtn(); });

  el.querySelectorAll("[data-pc-title]").forEach(inp=>inp.addEventListener("input", e=>{
    ensurePageContent(inp.dataset.pcTitle); state.pageContent[inp.dataset.pcTitle].title=e.target.value; updatePreview();
  }));
  el.querySelectorAll("[data-pc-text]").forEach(t=>t.addEventListener("input", e=>{
    ensurePageContent(t.dataset.pcText); state.pageContent[t.dataset.pcText].text=e.target.value;
  }));
  el.querySelectorAll("[data-pc-imgbtn]").forEach(b=>b.addEventListener("click", ()=>{
    const id=b.dataset.pcImgbtn;
    const input = el.querySelector(`[data-pc-imginput="${id}"]`);
    if(input) input.click();
  }));
  el.querySelectorAll("[data-pc-imginput]").forEach(inp=>inp.addEventListener("change", e=>{
    const id = inp.dataset.pcImginput; const f = e.target.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload = ()=>{ ensurePageContent(id); state.pageContent[id].image=reader.result; renderStep(); };
    reader.readAsDataURL(f);
  }));
  el.querySelectorAll("[data-pc-imgremove]").forEach(b=>b.addEventListener("click", ()=>{
    const id=b.dataset.pcImgremove; if(state.pageContent[id]) state.pageContent[id].image=null; renderStep();
  }));

  el.querySelectorAll("[data-swatch]").forEach(b=>b.addEventListener("click", ()=>{ state.form.accent=b.dataset.swatch; renderStep(); }));
  const customColor = document.getElementById("customColor");
  if(customColor) customColor.addEventListener("input", e=>{ state.form.accent=e.target.value; renderStep(); });
  const resetAccent = document.getElementById("resetAccent");
  if(resetAccent) resetAccent.addEventListener("click", ()=>{ state.form.accent=null; renderStep(); });

  const logoBtn = document.getElementById("logoBtn");
  const logoInput = document.getElementById("logoInput");
  if(logoBtn && logoInput){
    logoBtn.addEventListener("click", ()=>logoInput.click());
    logoInput.addEventListener("change", e=>{
      const f = e.target.files[0]; if(!f) return;
      const reader = new FileReader();
      reader.onload = ()=>{ state.logo = reader.result; renderStep(); };
      reader.readAsDataURL(f);
    });
  }
  const logoRemove = document.getElementById("logoRemove");
  if(logoRemove) logoRemove.addEventListener("click", ()=>{ state.logo=null; renderStep(); });
}

function bindText(id, fn){ const input = document.getElementById(id); if(input) input.addEventListener("input", e=>fn(e.target.value)); }
function syncNextBtn(){ const btn = document.getElementById("nextBtn"); if(btn) btn.disabled = !canNext(); }
function syncCheckBtn(){ const btn = document.getElementById("checkDomainBtn"); if(btn) btn.disabled = !state.domain.wunsch.trim() || state.domain.checking; }
function syncSubmitBtn(){ const btn = document.getElementById("submitBtn"); if(btn) btn.disabled = !state.agb; }

/* ================= INIT ================= */
renderAll();
</script>
</body>
</html>
